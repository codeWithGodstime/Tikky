<div id="results-overlay" class="fixed inset-0 z-[100] bg-background/95 flex-col items-center justify-center pt-16 px-gutter">
    <div class="scanline"></div>
    <div class="z-10 flex flex-col items-center max-w-lg w-full text-center">
        <div class="mb-sm">
            <span class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-widest">Session Concluded</span>
        </div>
        <h1 id="result-text" class="font-display-lg text-display-lg uppercase glitch-text mb-xl text-primary-container">VICTORY</h1>
        <div class="w-full grid grid-cols-2 gap-md mb-xl">
            <div class="border border-outline-variant p-md bg-surface-container-low flex flex-col items-center justify-center">
                <span class="font-label-sm text-label-sm text-on-surface-variant uppercase mb-xs">Your Symbol</span>
                <span id="result-your-symbol" class="material-symbols-outlined text-4xl text-primary">close</span>
            </div>
            <div class="border border-outline-variant p-md bg-surface-container-low flex flex-col items-center justify-center">
                <span class="font-label-sm text-label-sm text-on-surface-variant uppercase mb-xs">Opponent</span>
                <span id="result-opponent-symbol" class="material-symbols-outlined text-4xl text-secondary">circle</span>
            </div>
        </div>
        <div class="flex justify-between w-full mb-xl border-y border-outline-variant py-md">
            <div class="flex flex-col items-start">
                <span class="font-label-sm text-label-sm text-on-surface-variant">MATCH_ID</span>
                <span id="result-match-id" class="font-label-md text-label-md text-on-surface">#{{ short_code }}</span>
            </div>
            <div class="flex flex-col items-end">
                <span class="font-label-sm text-label-sm text-on-surface-variant">RESULT</span>
                <span id="result-message" class="font-label-md text-label-md text-on-surface"></span>
            </div>
        </div>
        <div class="w-full flex flex-col gap-md">
            <a href="{% url 'lobby' %}" class="w-full py-4 bg-background border border-primary text-primary font-label-md text-label-md uppercase tracking-widest hover:bg-primary hover:text-background transition-all duration-200 active:scale-95 neon-border-pulse">
                Back to Lobby
            </a>
        </div>
    </div>
</div>
